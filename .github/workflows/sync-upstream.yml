name: Sync Fork With Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream main into fork
    if: ${{ github.event.repository.fork }}
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPOSITORY: pingdotgg/t3code
      UPSTREAM_BRANCH: main
      TARGET_BRANCH: main
      CODEX_MERGE_MODEL: ${{ vars.CODEX_MERGE_MODEL || 'gpt-5.5' }}
      CODEX_MERGE_REASONING_EFFORT: ${{ vars.CODEX_MERGE_REASONING_EFFORT || 'medium' }}
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"
          git fetch origin "${TARGET_BRANCH}"

      - name: Merge upstream main
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"

          set +e
          git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          merge_status=$?
          set -e

          if [ "${merge_status}" -eq 0 ]; then
            echo "conflict=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "conflict=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::Upstream merge produced conflicts; Codex repair step will run."
            git status --short
            exit 0
          fi

          exit "${merge_status}"

      - name: Set up Node for Codex conflict repair
        if: steps.merge.outputs.conflict == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure Codex auth
        id: codex_auth
        if: steps.merge.outputs.conflict == 'true'
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          mkdir -p "${CODEX_HOME}"
          cat > "${CODEX_HOME}/config.toml" <<'TOML'
          cli_auth_credentials_store = "file"
          TOML

          if [ -n "${CODEX_AUTH_JSON_B64}" ]; then
            printf '%s' "${CODEX_AUTH_JSON_B64}" | base64 -d > "${CODEX_HOME}/auth.json"
            chmod 600 "${CODEX_HOME}/auth.json"
            echo "auth_mode=chatgpt" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${CODEX_ACCESS_TOKEN}" ]; then
            echo "auth_mode=chatgpt" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -n "${OPENAI_API_KEY}" ]; then
            echo "auth_mode=api" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Merge conflicts require Codex repair, but no Codex credential is configured. Prefer CODEX_AUTH_JSON_B64 or CODEX_ACCESS_TOKEN to use ChatGPT-backed Codex; OPENAI_API_KEY remains a usage-billed fallback."
          exit 1

      - name: Repair merge conflicts with Codex
        if: steps.merge.outputs.conflict == 'true'
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          npx -y @openai/codex@latest exec \
            --model "${CODEX_MERGE_MODEL}" \
            -c "model_reasoning_effort=\"${CODEX_MERGE_REASONING_EFFORT}\"" \
            --sandbox workspace-write \
            --ask-for-approval never \
            --cd "${GITHUB_WORKSPACE}" \
            "A merge from upstream/${UPSTREAM_BRANCH} into ${TARGET_BRANCH} has conflicts. Resolve only the merge conflicts in this repository, preserving both upstream and fork behavior where possible. Do not make unrelated refactors, do not commit, and do not push. Leave the repository ready for 'git commit --no-edit'. Run 'git status --short' and 'git diff --check' before finishing."

      - name: Finalize Codex conflict repair
        if: steps.merge.outputs.conflict == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "::error::Codex finished with unresolved merge conflicts."
            git diff --name-only --diff-filter=U
            exit 1
          fi

          git diff --check

          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            git add -A
            if git diff --cached --quiet; then
              echo "::error::Merge is still in progress, but no resolved changes are staged."
              exit 1
            fi
            git commit --no-edit
          else
            echo "No merge is in progress after Codex repair; assuming Codex completed it."
          fi

      - name: Push fork main
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/${TARGET_BRANCH}")" ]; then
            echo "Fork ${TARGET_BRANCH} is already up to date with upstream ${UPSTREAM_BRANCH}."
            exit 0
          fi

          git push origin "HEAD:${TARGET_BRANCH}"
